<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organization Database</title>

<style>

body{

background:#050505;

margin:0;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Consolas,monospace;

color:#00ff99;

}

.container{

width:90%;

max-width:700px;

border:1px solid #00ff99;

padding:30px;

box-shadow:0 0 15px #00ff9955;

}

h1{

text-align:center;

letter-spacing:4px;

font-size:32px;

margin-bottom:40px;

}

.info{

margin-bottom:40px;

line-height:2;

}

.search{

display:flex;

gap:10px;

}

input{

flex:1;

background:black;

border:1px solid #00ff99;

color:#00ff99;

padding:12px;

font-size:18px;

outline:none;

}

button{

background:#00ff99;

color:black;

border:none;

padding:12px 20px;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:white;

}

.footer{

margin-top:40px;

font-size:13px;

opacity:.6;

text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h1>

ORGANIZATION DATABASE

</h1>

<div class="info">

ACCESS LEVEL : GUEST

<br>

STATUS : CONNECTED

</div>

<div class="search">

<input

placeholder="Search File">

<button>

SEARCH

</button>

</div>

<div class="footer">

ORGANIZATION NETWORK v1.0

</div>

</div>

</body>

</html>
